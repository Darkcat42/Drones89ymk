<section class="" id="faq">
  <div class="container">
    <div class="text-center">
      <h2 class="mb-3">FAQ</h2>
      <hr class="hr-line">
      <p class="mb-5 custom_p">Здесь мы собрали самые популярные вопросы студентов Ямальского многопрофильного колледжа, на которые даем ответы. Все получится!</p>
    </div>
    <div class="accordion" id="accordionExample">
    {% for answ_que in faq %}
      <div class="accordion-item">
        <h2 class="accordion-header">
          <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapse{{loop.index}}" aria-expanded="true" aria-controls="collapse{{loop.index}}">
            {{answ_que.question}}
          </button>
        </h2>
        <div id="collapse{{loop.index}}" class="accordion-collapse collapse show" aria-labelledby="heading{{loop.index}}" data-bs-parent="#accordionExample">
          <div class="accordion-body">
            {{answ_que.answer}} 
          </div>
        </div>
      </div>
    {% endfor %}
      {% if current_user.is_authenticated %}
        <a href="/admin/faq/new/?url=/#faq" class="text-black">добавить вопрос-ответ</a>
        {% endif %}
